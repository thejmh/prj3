<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>테트리스</title>
  <style>
    :root {
      --bg: #0f1020;
      --panel: #1a1c34;
      --line: #2a2d4a;
      --text: #e7e9f5;
      --muted: #8a8fb5;
      --accent: #6ee7ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, #1b1e3a 0%, var(--bg) 60%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 16px;
    }
    .wrap {
      display: flex; gap: 20px; align-items: flex-start;
    }
    h1 {
      font-size: 15px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); margin: 0 0 12px; font-weight: 600;
    }
    .stage {
      position: relative;
      border-radius: 14px;
      background: var(--panel);
      padding: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.04);
    }
    canvas { display: block; border-radius: 8px; background: #0b0c1c; }
    .side { width: 148px; display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: var(--panel); border-radius: 12px; padding: 12px 14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .card h2 {
      margin: 0 0 8px; font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    .stat { font-variant-numeric: tabular-nums; font-size: 26px; font-weight: 700; }
    .mini { display: block; margin: 0 auto; }
    .keys { font-size: 12px; color: var(--muted); line-height: 1.9; }
    .keys b { color: var(--text); font-weight: 600; }
    .overlay {
      position: absolute; inset: 10px; border-radius: 8px;
      background: rgba(9,10,26,.82); backdrop-filter: blur(3px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 20px;
    }
    .overlay.hidden { display: none; }
    .overlay .big { font-size: 24px; font-weight: 800; letter-spacing: .04em; }
    .overlay .sub { color: var(--muted); font-size: 13px; line-height: 1.6; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: var(--accent); color: #04222b; font-weight: 700;
      padding: 11px 22px; border-radius: 999px; font-size: 14px;
      transition: transform .08s ease, filter .15s ease;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }
    @media (max-width: 560px) {
      .wrap { flex-direction: column; align-items: center; gap: 12px; }
      .side { width: min(92vw, 320px); flex-direction: row; flex-wrap: wrap; }
      .card { flex: 1 1 120px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <canvas id="board"></canvas>
      <div id="overlay" class="overlay">
        <div class="big" id="ovTitle">테트리스</div>
        <div class="sub" id="ovSub">← → 이동 · ↑ 회전 · ↓ 소프트드롭<br>Space 하드드롭 · C 홀드 · P 일시정지</div>
        <button id="startBtn">시작</button>
      </div>
    </div>

    <div class="side">
      <div class="card">
        <h2>점수</h2>
        <div class="stat" id="score">0</div>
      </div>
      <div class="card">
        <h2>다음</h2>
        <canvas id="next" class="mini" width="96" height="96"></canvas>
      </div>
      <div class="card">
        <h2>홀드</h2>
        <canvas id="hold" class="mini" width="96" height="96"></canvas>
      </div>
      <div class="card">
        <h2>레벨 · 라인</h2>
        <div class="stat" style="font-size:18px"><span id="level">1</span> · <span id="lines">0</span></div>
      </div>
      <div class="card">
        <h2>조작</h2>
        <div class="keys">
          <b>← →</b> 이동<br>
          <b>↑</b> 회전 · <b>↓</b> 소프트<br>
          <b>Space</b> 하드드롭<br>
          <b>C</b> 홀드 · <b>P</b> 일시정지
        </div>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const COLS = 10, ROWS = 20;
    let CELL = 28;
    const board = document.getElementById('board');
    const ctx = board.getContext('2d');

    // size the board to fill the browser height (keeping the 10x20 ratio),
    // clamped so it never overflows the available width.
    function fit() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const isNarrow = vw < 560;
      const maxH = vh - (isNarrow ? 24 : 40);
      const maxBoardW = isNarrow ? vw - 32 : vw - 220;
      CELL = Math.max(16, Math.min(Math.floor(maxH / ROWS), Math.floor(maxBoardW / COLS)));
      board.width = COLS * CELL;
      board.height = ROWS * CELL;
    }
    fit();

    const nextCv = document.getElementById('next');
    const nctx = nextCv.getContext('2d');
    const holdCv = document.getElementById('hold');
    const hctx = holdCv.getContext('2d');

    const el = {
      score: document.getElementById('score'),
      level: document.getElementById('level'),
      lines: document.getElementById('lines'),
      overlay: document.getElementById('overlay'),
      ovTitle: document.getElementById('ovTitle'),
      ovSub: document.getElementById('ovSub'),
      startBtn: document.getElementById('startBtn'),
    };

    const COLORS = {
      I: '#6ee7ff', O: '#ffd76e', T: '#c58bff',
      S: '#7be07b', Z: '#ff7b8a', J: '#7b8bff', L: '#ff9f5a',
    };
    // rotation states as lists of [x,y] offsets in a 4x4 box
    const SHAPES = {
      I: [[0,1],[1,1],[2,1],[3,1]],
      O: [[1,0],[2,0],[1,1],[2,1]],
      T: [[1,0],[0,1],[1,1],[2,1]],
      S: [[1,0],[2,0],[0,1],[1,1]],
      Z: [[0,0],[1,0],[1,1],[2,1]],
      J: [[0,0],[0,1],[1,1],[2,1]],
      L: [[2,0],[0,1],[1,1],[2,1]],
    };
    const TYPES = Object.keys(SHAPES);

    let grid, cur, nextType, holdType, canHold, bag;
    let score, lines, level, dropMs, acc, last, running, paused, over;

    function newBag() {
      const b = TYPES.slice();
      for (let i = b.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        [b[i], b[j]] = [b[j], b[i]];
      }
      return b;
    }
    function pull() {
      if (!bag || !bag.length) bag = newBag();
      return bag.pop();
    }

    function makePiece(type) {
      return { type, cells: SHAPES[type].map(c => c.slice()), x: 3, y: -1 };
    }

    function rotate(cells, dir) {
      // rotate within 4x4 box around center (1.5,1.5)
      return cells.map(([x, y]) => dir > 0 ? [3 - y, x] : [y, 3 - x]);
    }

    function collides(cells, ox, oy) {
      for (const [cx, cy] of cells) {
        const x = ox + cx, y = oy + cy;
        if (x < 0 || x >= COLS || y >= ROWS) return true;
        if (y >= 0 && grid[y][x]) return true;
      }
      return false;
    }

    function spawn(type) {
      cur = makePiece(type || pull());
      canHold = true;
      if (collides(cur.cells, cur.x, cur.y)) gameOver();
    }

    function lockPiece() {
      for (const [cx, cy] of cur.cells) {
        const x = cur.x + cx, y = cur.y + cy;
        if (y >= 0) grid[y][x] = cur.type;
      }
      clearLines();
      spawn(nextType);
      nextType = pull();
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--) {
        if (grid[y].every(c => c)) {
          grid.splice(y, 1);
          grid.unshift(new Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared) {
        const pts = [0, 100, 300, 500, 800][cleared] * level;
        score += pts;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropMs = Math.max(90, 800 - (level - 1) * 65);
        updateHud();
      }
    }

    function ghostY() {
      let y = cur.y;
      while (!collides(cur.cells, cur.x, y + 1)) y++;
      return y;
    }

    function move(dx) {
      if (!collides(cur.cells, cur.x + dx, cur.y)) { cur.x += dx; return true; }
      return false;
    }
    function softDrop() {
      if (!collides(cur.cells, cur.x, cur.y + 1)) { cur.y++; score += 1; updateHud(); }
      else lockPiece();
      acc = 0;
    }
    function hardDrop() {
      const gy = ghostY();
      score += (gy - cur.y) * 2;
      cur.y = gy;
      lockPiece();
      acc = 0;
    }
    function tryRotate(dir) {
      const r = rotate(cur.cells, dir);
      for (const dx of [0, -1, 1, -2, 2]) {
        if (!collides(r, cur.x + dx, cur.y)) { cur.cells = r; cur.x += dx; return; }
      }
    }
    function hold() {
      if (!canHold) return;
      const prev = holdType;
      holdType = cur.type;
      if (prev) spawn(prev);
      else { spawn(nextType); nextType = pull(); }
      canHold = false;
      drawHold();
    }

    // ---- rendering ----
    function cellRect(g, x, y, color, size) {
      g.fillStyle = color;
      g.fillRect(x * size, y * size, size, size);
      g.fillStyle = 'rgba(255,255,255,.18)';
      g.fillRect(x * size, y * size, size, 3);
      g.fillStyle = 'rgba(0,0,0,.22)';
      g.fillRect(x * size, y * size + size - 3, size, 3);
      g.strokeStyle = 'rgba(0,0,0,.35)';
      g.lineWidth = 1;
      g.strokeRect(x * size + .5, y * size + .5, size - 1, size - 1);
    }

    function draw() {
      ctx.clearRect(0, 0, board.width, board.height);
      // grid lines
      ctx.strokeStyle = 'rgba(255,255,255,.04)';
      ctx.lineWidth = 1;
      for (let x = 1; x < COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,board.height); ctx.stroke(); }
      for (let y = 1; y < ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(board.width,y*CELL); ctx.stroke(); }

      for (let y = 0; y < ROWS; y++)
        for (let x = 0; x < COLS; x++)
          if (grid[y][x]) cellRect(ctx, x, y, COLORS[grid[y][x]], CELL);

      if (cur) {
        const gy = ghostY();
        ctx.globalAlpha = 0.22;
        for (const [cx, cy] of cur.cells)
          if (gy + cy >= 0) cellRect(ctx, cur.x + cx, gy + cy, COLORS[cur.type], CELL);
        ctx.globalAlpha = 1;
        for (const [cx, cy] of cur.cells)
          if (cur.y + cy >= 0) cellRect(ctx, cur.x + cx, cur.y + cy, COLORS[cur.type], CELL);
      }
    }

    function drawMini(g, cv, type) {
      g.clearRect(0, 0, cv.width, cv.height);
      if (!type) return;
      const s = 20;
      const cells = SHAPES[type];
      const xs = cells.map(c => c[0]), ys = cells.map(c => c[1]);
      const w = Math.max(...xs) - Math.min(...xs) + 1;
      const h = Math.max(...ys) - Math.min(...ys) + 1;
      const offX = (cv.width - w * s) / 2 - Math.min(...xs) * s;
      const offY = (cv.height - h * s) / 2 - Math.min(...ys) * s;
      for (const [cx, cy] of cells) {
        g.save();
        g.translate(offX, offY);
        cellRect(g, cx, cy, COLORS[type], s);
        g.restore();
      }
    }
    const drawNext = () => drawMini(nctx, nextCv, nextType);
    const drawHold = () => drawMini(hctx, holdCv, holdType);

    function updateHud() {
      el.score.textContent = score;
      el.level.textContent = level;
      el.lines.textContent = lines;
    }

    // ---- loop ----
    function loop(t) {
      if (!running) return;
      requestAnimationFrame(loop);
      if (paused || over) return;
      if (!last) last = t;
      acc += t - last;
      last = t;
      if (acc >= dropMs) { softDrop(); }
      draw();
      drawNext();
    }

    function reset() {
      grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
      bag = newBag();
      holdType = null; canHold = true;
      score = 0; lines = 0; level = 1; dropMs = 800; acc = 0; last = 0;
      over = false; paused = false;
      nextType = pull();
      spawn(pull());
      updateHud();
      drawHold();
    }

    function start() {
      reset();
      running = true;
      hideOverlay();
      requestAnimationFrame(loop);
    }

    function gameOver() {
      over = true; running = false;
      showOverlay('게임 오버', `점수 ${score} · 라인 ${lines}`, '다시 시작');
    }
    function togglePause() {
      if (over || !running) return;
      paused = !paused;
      if (paused) showOverlay('일시정지', 'P 키로 계속', '계속하기');
      else { hideOverlay(); last = 0; }
    }
    function showOverlay(title, sub, btn) {
      el.ovTitle.textContent = title;
      el.ovSub.innerHTML = sub;
      el.startBtn.textContent = btn;
      el.overlay.classList.remove('hidden');
    }
    function hideOverlay() { el.overlay.classList.add('hidden'); }

    el.startBtn.addEventListener('click', () => {
      if (paused && running) { togglePause(); }
      else start();
    });

    document.addEventListener('keydown', (e) => {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
      if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
      if (!running || paused || over) return;
      switch (e.key) {
        case 'ArrowLeft': move(-1); break;
        case 'ArrowRight': move(1); break;
        case 'ArrowUp': case 'x': case 'X': tryRotate(1); break;
        case 'z': case 'Z': tryRotate(-1); break;
        case 'ArrowDown': softDrop(); break;
        case ' ': hardDrop(); break;
        case 'c': case 'C': hold(); break;
      }
      draw();
    }, { passive: false });

    // basic touch controls (swipe/tap)
    let tsx = 0, tsy = 0, tmoved = false, tt = 0;
    board.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0]; tsx = t.clientX; tsy = t.clientY; tmoved = false; tt = Date.now();
    }, { passive: true });
    board.addEventListener('touchmove', (e) => {
      if (!running || paused || over) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - tsx, dy = t.clientY - tsy;
      if (Math.abs(dx) > 24) { move(dx > 0 ? 1 : -1); tsx = t.clientX; tmoved = true; draw(); }
      else if (dy > 24) { softDrop(); tsy = t.clientY; tmoved = true; draw(); }
    }, { passive: true });
    board.addEventListener('touchend', (e) => {
      if (!running || paused || over) return;
      const dy = e.changedTouches[0].clientY - tsy;
      if (!tmoved && Date.now() - tt < 250) { tryRotate(1); draw(); }
      else if (dy > 90) { hardDrop(); draw(); }
    }, { passive: true });

    // refit on viewport changes
    window.addEventListener('resize', () => {
      fit();
      draw();
      drawNext();
      drawHold();
    });

    // initial paint
    grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
    draw();
  })();
  </script>
</body>
</html>
